<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Votazioni Poesie - Notte del Classico</title>
    <style>
        body {
            margin: 0;
            padding: 20px;
            font-family: "Georgia", serif;
            background: radial-gradient(circle at center, #243b55 0%, #141e30 100%);
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
            overflow: hidden;
        }

        .container {
            text-align: center;
            background: rgba(255, 255, 255, 0.08);
            padding: 40px 30px;
            border-radius: 24px;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 20px 50px rgba(0,0,0,0.4);
            max-width: 450px;
            width: 100%;
            animation: fadeIn 1.2s ease-out;
            position: relative;
            z-index: 2;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .logo-placeholder {
            font-size: 50px;
            margin-bottom: 20px;
            display: block;
            filter: drop-shadow(0 0 10px rgba(79, 172, 254, 0.5));
        }

        h1 {
            font-size: 28px;
            margin-bottom: 8px;
            letter-spacing: 1px;
            background: linear-gradient(to bottom, #fff, #ccc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        h2 {
            font-size: 16px;
            font-weight: 300;
            margin-bottom: 30px;
            color: rgba(255, 255, 255, 0.7);
            line-height: 1.4;
        }

        .qr-wrapper {
            background: #fff;
            padding: 12px;
            border-radius: 18px;
            display: inline-block;
            margin-bottom: 30px;
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
        }

        .qr-wrapper:hover {
            transform: scale(1.05) rotate(1deg);
        }

        .qr-wrapper img {
            display: block;
            width: 200px;
            height: 200px;
        }

        .btn {
            display: inline-block;
            padding: 15px 40px;
            font-size: 18px;
            font-weight: bold;
            color: #fff;
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            border-radius: 50px;
            text-decoration: none;
            transition: all 0.3s ease;
            box-shadow: 0 5px 15px rgba(0, 242, 254, 0.4);
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            border: none;
        }

        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(0, 242, 254, 0.6);
        }

        .footer {
            margin-top: 35px;
            font-size: 13px;
            color: rgba(255, 255, 255, 0.5);
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        /* Controllo Volume Visivo */
        #music-control {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: rgba(255,255,255,0.1);
            padding: 10px;
            border-radius: 50%;
            cursor: pointer;
            z-index: 10;
        }
    </style>
</head>
<body onclick="playMusic()">

<audio id="bgMusic" loop>
    <source src="https://www.chosic.com/wp-content/uploads/2021/07/The-Grand-Valse.mp3" type="audio/mpeg">
</audio>

<div class="container">
    <span class="logo-placeholder">📜</span>

    <h1>Votazioni Poesie</h1>
    <h2>Scansiona il QR code o clicca il pulsante per votare. <br><small>(L'audio si attiverà al primo clic)</small></h2>

    <div class="qr-wrapper">
        <img src="https://api.qrserver.com/v1/create-qr-code/?size=250x250&data=https://forms.gle/cCVpVLhmKujrzX3Z8" alt="QR Code">
    </div>

    <br>

    <a href="https://forms.gle/cCVpVLhmKujrzX3Z8" class="btn" target="_blank" onclick="playMusic()">
        Vota Ora
    </a>

    <div class="footer">
        Notte Nazionale del Liceo Classico 
    </div>
</div>

<script>
    var musicStarted = false;
    function playMusic() {
        var audio = document.getElementById("bgMusic");
        if (!musicStarted) {
            audio.volume = 0.4; // Volume al 40% per non disturbare troppo
            audio.play();
            musicStarted = true;
        }
    }
</script>

</body>
</html>
